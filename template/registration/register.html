{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Register | UNI WISE</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<h2>Register</h2>

<form id="registerForm">

    <input
        type="text"
        id="name"
        placeholder="Name"
        required
    />
    <br><br>

    <input
        type="email"
        id="email"
        placeholder="Email"
        required
    />
    <br><br>

    <input
        type="password"
        id="password"
        placeholder="Password"
        required
    />
    <br><br>

    <button type="submit">Register</button>
</form>

<p id="status"></p>

<script src="{% static 'js/register.js' %}" defer></script>

</body>
</html>
